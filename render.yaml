services:
  - type: web
    name: snow-ai
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: LOYVERSE_TOKEN
        value: d18826e6c76345888204b310aaca1351
      - key: STREAMLIT_SERVER_PORT
        value: $PORT
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
      - key: STREAMLIT_THEME_BASE
        value: light
      - key: STREAMLIT_SERVER_ENABLE_CORS
        value: false
      - key: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
        value: false
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/loyverse_data.db
    disk:
      name: snowbomb-database
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: web
    name: snow-ai-delivery
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: ./start_delivery.sh
    envVars:
      - key: DELIVERY_DATABASE_URL
        fromDatabase:
          name: snow-ai-delivery-db
          property: connectionString
      - key: SOURCE_SQLITE_PATH
        value: /opt/render/project/src/data/loyverse_data.db
      - key: LINE_LIFF_ID
        value: REPLACE_WITH_LINE_LIFF_ID
      - key: LINE_CHANNEL_ID
        value: REPLACE_WITH_LINE_CHANNEL_ID
      - key: LINE_CHANNEL_SECRET
        value: REPLACE_WITH_LINE_CHANNEL_SECRET
      - key: S3_ENDPOINT
        value: REPLACE_WITH_S3_ENDPOINT
      - key: S3_BUCKET
        value: REPLACE_WITH_S3_BUCKET
      - key: S3_ACCESS_KEY_ID
        value: REPLACE_WITH_S3_ACCESS_KEY_ID
      - key: S3_SECRET_ACCESS_KEY
        value: REPLACE_WITH_S3_SECRET_ACCESS_KEY
      - key: S3_REGION
        value: auto
      - key: APP_BASE_URL
        value: https://snow-ai-delivery.onrender.com
      - key: ADMIN_PASSWORD
        value: REPLACE_WITH_ADMIN_PASSWORD
      - key: ADMIN_INTERNAL_API_TOKEN
        value: REPLACE_WITH_ADMIN_INTERNAL_API_TOKEN
      - key: PYTHONUNBUFFERED
        value: 1

  - type: web
    name: snow-ai-delivery-admin
    runtime: node
    plan: starter
    region: singapore
    buildCommand: cd delivery_admin && npm install && npm run build
    startCommand: cd delivery_admin && npm run start
    envVars:
      - key: DELIVERY_API_BASE_URL
        value: https://snow-ai-delivery.onrender.com
      - key: ADMIN_PASSWORD
        value: REPLACE_WITH_ADMIN_PASSWORD
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_INTERNAL_API_TOKEN
        value: REPLACE_WITH_ADMIN_INTERNAL_API_TOKEN
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  - type: cron
    name: daily-briefing
    runtime: python
    plan: starter
    region: singapore
    schedule: "0 2 * * *"  # Runs daily at 2:00 AM UTC (9:00 AM Bangkok time)
    buildCommand: pip install -r requirements.txt
    startCommand: python3 daily_briefing.py
    envVars:
      - key: LOYVERSE_TOKEN
        value: d18826e6c76345888204b310aaca1351
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/loyverse_data.db
      - key: PYTHONUNBUFFERED
        value: 1
      # IMPORTANT: Replace these placeholder values with your actual LINE credentials
      # You can set these in the Render dashboard under Environment Variables
      # Or uncomment and replace the values below:
      # - key: LINE_CHANNEL_ACCESS_TOKEN
      #   value: YOUR_LINE_CHANNEL_ACCESS_TOKEN_HERE
      # - key: LINE_RECIPIENT_ID_GROUP
      #   value: YOUR_LINE_GROUP_ID_HERE
      # Alternative: Use LINE_RECIPIENT_ID for individual user instead of group
    disk:
      name: snowbomb-database
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: cron
    name: delivery-metadata-sync
    runtime: python
    plan: starter
    region: singapore
    schedule: "0 1 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/trigger_delivery_customer_sync.py
    envVars:
      - key: APP_BASE_URL
        value: https://snow-ai-delivery.onrender.com
      - key: DELIVERY_SYNC_SECRET
        value: REPLACE_WITH_DELIVERY_SYNC_SECRET
      - key: PYTHONUNBUFFERED
        value: 1

databases:
  - name: snow-ai-delivery-db
    plan: basic-256mb
    region: singapore
    databaseName: snow_ai_delivery
    user: snow_ai_delivery
    postgresMajorVersion: "17"
