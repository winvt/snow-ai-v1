<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delivery Reports Admin</title>
    <link rel="stylesheet" href="/static/delivery.css">
</head>
<body>
    <main class="app-shell admin-shell">
        <header class="hero admin-hero">
            <div>
                <p class="eyebrow">Snow AI Delivery</p>
                <h1>Admin</h1>
            </div>
            <p class="subtitle">Reports, photos, and location access.</p>
        </header>

        <nav class="admin-tabs" aria-label="Admin sections">
            <button class="admin-tab is-active" type="button" data-tab="reports">Reports</button>
            <button class="admin-tab" type="button" data-tab="users">Users</button>
        </nav>

        <section id="admin-tab-reports" class="admin-tab-panel">
            <section class="panel report-workspace">
                <form id="admin-filters" class="report-toolbar">
                    <div class="report-toolbar-copy">
                        <p class="toolbar-label">Recent reports</p>
                        <div id="admin-status">Loading reports...</div>
                    </div>
                    <label class="field admin-location-field">
                        <span>Locations</span>
                        <div id="location-ids" class="chip-filter-grid"></div>
                    </label>
                    <div class="toolbar-fields">
                        <label class="field">
                            <span>Date From</span>
                            <input type="date" id="date-from" name="date_from">
                        </label>
                        <label class="field">
                            <span>Date To</span>
                            <input type="date" id="date-to" name="date_to">
                        </label>
                        <label class="field">
                            <span>Customer ID</span>
                            <input type="text" id="customer-id" name="customer_id" placeholder="optional">
                        </label>
                        <label class="field">
                            <span>LINE User ID</span>
                            <input type="text" id="user-id" name="user_id" placeholder="optional">
                        </label>
                    </div>
                    <div class="toolbar-actions">
                        <button class="ghost-button" id="reset-filters" type="button">Clear</button>
                        <button class="primary-button" type="submit">Load Reports</button>
                    </div>
                </form>

                <div class="report-layout">
                    <section class="report-feed">
                        <div id="report-grid" class="report-grid report-photo-grid"></div>
                    </section>
                    <aside id="report-drawer" class="report-drawer is-empty">
                        <div class="drawer-empty">
                            <p class="toolbar-label">Preview</p>
                            <h2>Select a report</h2>
                            <p>Pick any photo to inspect the visit details.</p>
                        </div>
                    </aside>
                </div>
            </section>
        </section>

        <section id="admin-tab-users" class="admin-tab-panel hidden">
            <section class="panel users-workspace">
                <div class="users-toolbar">
                    <div>
                        <p class="toolbar-label">User access</p>
                        <div id="users-status">Loading users...</div>
                    </div>
                    <label class="field users-search-field">
                        <span>Search user</span>
                        <input type="search" id="user-search" placeholder="Name or LINE user ID">
                    </label>
                </div>
                <div id="users-grid" class="users-grid users-list"></div>
            </section>
        </section>
    </main>

    <script src="/static/admin.js"></script>
</body>
</html>
