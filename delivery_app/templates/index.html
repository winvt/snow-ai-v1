<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Snow AI Delivery</title>
    <link rel="stylesheet" href="/static/delivery.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body data-liff-id="{{ liff_id }}">
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Snow AI Delivery</p>
            <h1>Photo</h1>
        </header>

        <section class="status-strip">
            <p id="status-text">Booting...</p>
        </section>

        <section id="screen-entry" class="screen">
            <div class="panel top-actions">
                <button class="chip-button" id="open-location-sheet" type="button">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M12 21s-6-5.4-6-11a6 6 0 1 1 12 0c0 5.6-6 11-6 11Zm0-8.5A2.5 2.5 0 1 0 12 7a2.5 2.5 0 0 0 0 5.5Z"></path>
                        </svg>
                    </span>
                    <span class="button-copy">
                        <span class="button-label">Location</span>
                        <span id="selected-location-pill" class="button-value">-</span>
                    </span>
                </button>
                <button class="ghost-button" id="refresh-shops" type="button">Refresh</button>
            </div>

            <section id="recent-panel" class="panel hidden">
                <div class="section-head">
                    <h2>Recent</h2>
                </div>
                <div id="recent-list" class="recent-strip"></div>
            </section>

            <section class="panel">
                <label class="search-field" for="customer-search">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M10 4a6 6 0 1 0 3.8 10.6l4.3 4.3 1.4-1.4-4.3-4.3A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                        </svg>
                    </span>
                    <input id="customer-search" type="search" placeholder="Find shop">
                </label>
                <div id="customer-list" class="shop-list"></div>
            </section>
        </section>

        <section id="screen-report" class="screen hidden">
            <div class="panel capture-shell">
                <div class="capture-top">
                    <button class="ghost-button" id="back-to-entry" type="button">Back</button>
                    <div class="shop-badge">
                        <span class="badge-label">Shop</span>
                        <strong id="selected-customer-name">-</strong>
                        <span id="selected-location-name" class="badge-subvalue">-</span>
                    </div>
                </div>

                <label class="camera-card" for="photo-input">
                    <input id="photo-input" accept="image/*" capture="environment" type="file">
                    <div id="camera-empty" class="camera-empty">
                        <span class="camera-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M9 4h6l1.2 2H19a2 2 0 0 1 2 2v8a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V8a2 2 0 0 1 2-2h2.8L9 4Zm3 4.5A4.5 4.5 0 1 0 12 17a4.5 4.5 0 0 0 0-9Zm0 2A2.5 2.5 0 1 1 12 15a2.5 2.5 0 0 1 0-5Z"></path>
                            </svg>
                        </span>
                        <span class="camera-copy">Photo</span>
                    </div>
                    <img id="photo-preview" class="photo-preview hidden" alt="Preview">
                </label>

                <div class="capture-actions">
                    <button id="get-location" class="secondary-button" type="button">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M11 2h2v3.1A7 7 0 0 1 18.9 11H22v2h-3.1A7 7 0 0 1 13 18.9V22h-2v-3.1A7 7 0 0 1 5.1 13H2v-2h3.1A7 7 0 0 1 11 5.1V2Zm1 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z"></path>
                            </svg>
                        </span>
                        <span>GPS</span>
                    </button>
                    <div id="geo-status" class="gps-pill">GPS NEEDED</div>
                </div>
            </div>

            <div class="send-bar">
                <button id="submit-report" class="primary-button" type="button">Send</button>
            </div>
        </section>

        <section id="screen-done" class="screen hidden">
            <div class="panel done-panel">
                <div class="done-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M9.6 16.6 5.5 12.5l1.4-1.4 2.7 2.7 7.5-7.5 1.4 1.4-8.9 8.9Z"></path>
                    </svg>
                </div>
                <h2>Done</h2>
                <p id="done-shop-name">-</p>
                <button id="capture-next" class="primary-button" type="button">Next</button>
            </div>
        </section>

        <section id="location-sheet" class="sheet hidden" aria-hidden="true">
            <div class="sheet-backdrop" id="close-location-sheet"></div>
            <div class="sheet-panel">
                <div class="sheet-head">
                    <h2>Location</h2>
                    <button class="ghost-button" id="hide-location-sheet" type="button">Back</button>
                </div>
                <div id="location-list" class="location-list"></div>
            </div>
        </section>
    </main>

    <template id="location-item-template">
        <button class="location-item" type="button">
            <span class="selection-title"></span>
            <span class="selection-meta"></span>
        </button>
    </template>

    <template id="recent-item-template">
        <button class="recent-item" type="button">
            <span class="selection-title"></span>
            <span class="selection-meta"></span>
        </button>
    </template>

    <template id="customer-item-template">
        <button class="shop-item" type="button">
            <span class="selection-title"></span>
            <span class="selection-meta"></span>
        </button>
    </template>

    <script src="/static/app.js"></script>
</body>
</html>
