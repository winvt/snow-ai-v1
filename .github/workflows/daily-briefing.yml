name: Daily Briefing

on:
  schedule:
    # Runs daily at 4:00 PM Bangkok time (9:00 AM UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run daily briefing
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_RECIPIENT_ID_GROUP: ${{ secrets.LINE_RECIPIENT_ID_GROUP }}
          DATABASE_PATH: ./loyverse_data.db
          REPORT_TYPE: daily
        run: |
          python3 daily_briefing.py
      
      - name: Upload logs (if briefing fails)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: briefing-logs
          path: |
            *.log
            loyverse_data.db

